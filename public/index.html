<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎬 NeonMedia</title>
    <style>
        :root { --bg:#0a0f0a;--bg2:#111a11;--text:#c8e6c8;--text2:#8fbc8f;--accent:#3adb3a;--accent2:#2a8a2a;--header:#111a11;--border:#2a3a2a;--input:#152015;--hover:rgba(58,219,58,0.08);--shadow:0 0 30px rgba(58,219,58,0.2);--radius:14px; }
        * { margin:0;padding:0;box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);height:100vh;width:100vw;overflow:hidden;display:flex;flex-direction:column;position:fixed; }
        
        .header { background:var(--header);padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;z-index:10; }
        .header h1 { font-size:22px;color:var(--accent);text-align:center;margin-bottom:8px; }
        .search-row { display:flex;gap:8px;max-width:700px;margin:0 auto; }
        .search-row input { flex:1;padding:10px 16px;border-radius:24px;border:1px solid var(--border);background:var(--input);color:var(--text);font-size:14px;outline:none; }
        .search-row input:focus { border-color:var(--accent); }
        .search-row button { padding:10px 18px;border-radius:24px;border:none;background:var(--accent);color:#000;font-weight:700;cursor:pointer;font-size:14px;white-space:nowrap; }

        .main-content { flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch; }
        .section-title { font-size:16px;font-weight:700;margin-bottom:12px;color:var(--accent); }
        .video-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px; }
        @media(max-width:600px){ .video-grid{grid-template-columns:1fr;} }
        
        .video-card { background:var(--bg2);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform 0.2s,box-shadow 0.2s; }
        .video-card:active { transform:scale(0.98); }
        .video-card img { width:100%;aspect-ratio:16/9;object-fit:cover; }
        .video-card .info { padding:10px 12px; }
        .video-card .title { font-weight:600;font-size:13px;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }
        .video-card .channel { font-size:11px;color:var(--text2); }
        .video-card .views { font-size:10px;color:var(--text2);margin-top:2px; }

        .player-full { position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;z-index:100;display:none;flex-direction:column; }
        .player-full.active { display:flex; }
        .player-top { padding:12px 16px;display:flex;align-items:center;gap:12px;background:rgba(0,0,0,0.8);flex-shrink:0; }
        .player-top .close-btn { background:rgba(255,255,255,0.15);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer; }
        .player-top .vid-title { flex:1;font-size:13px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
        .player-wrap { flex:1;display:flex;align-items:center;justify-content:center; }
        .player-wrap iframe { width:100%;height:100%;border:none; }

        .loading { text-align:center;padding:40px;color:var(--text2); }
        .load-more { display:block;margin:16px auto;padding:12px 24px;border-radius:24px;border:none;background:var(--accent);color:#000;font-weight:700;font-size:14px;cursor:pointer; }

        .toast { position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;animation:fadeIn 0.3s;pointer-events:none; }
        @keyframes fadeIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 NeonMedia</h1>
        <div class="search-row">
            <input type="text" id="searchInput" placeholder="🔍 Поиск видео..." onkeypress="if(event.key==='Enter')search()">
            <button onclick="search()">🔍</button>
        </div>
    </div>
    <div class="main-content" id="mainContent">
        <div class="section-title">🔥 Популярное</div>
        <div class="video-grid" id="videoGrid"></div>
        <button class="load-more" id="loadMore" style="display:none;" onclick="loadMore()">📥 Ещё</button>
    </div>
    <div class="player-full" id="playerFull">
        <div class="player-top">
            <button class="close-btn" onclick="closePlayer()">✕</button>
            <div class="vid-title" id="vidTitle"></div>
        </div>
        <div class="player-wrap" id="playerWrap"></div>
    </div>
    <script>
        var API_KEY="AIzaSyAREyCW4pVYsM59LQorFKP5P8kpiQdcjWs";
        var currentQuery="",nextPageToken="";

        function toast(m){var o=document.querySelector('.toast');if(o)o.remove();var t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove();},2000);}

        function search(){
            currentQuery=document.getElementById('searchInput').value.trim();
            nextPageToken="";
            document.getElementById('videoGrid').innerHTML='<div class="loading">⏳ Поиск...</div>';
            document.getElementById('loadMore').style.display='none';
            currentQuery?fetchSearch(""):fetchTrending("");
        }

        function fetchTrending(token){
            var url="https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&chart=mostPopular&regionCode=US&maxResults=20&key="+API_KEY;
            if(token)url+="&pageToken="+token;
            fetch(url).then(function(r){return r.json();}).then(function(d){renderVideos(d,false);}).catch(function(){document.getElementById('videoGrid').innerHTML='<div class="loading">❌ Ошибка</div>';});
        }

        function fetchSearch(token){
            var url="https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=20&q="+encodeURIComponent(currentQuery)+"&type=video&key="+API_KEY;
            if(token)url+="&pageToken="+token;
            fetch(url).then(function(r){return r.json();}).then(function(d){renderVideos(d,true);}).catch(function(){document.getElementById('videoGrid').innerHTML='<div class="loading">❌ Ошибка</div>';});
        }

        function renderVideos(data,isSearch){
            nextPageToken=data.nextPageToken||"";
            var grid=document.getElementById('videoGrid');
            var html=grid.innerHTML.includes('⏳')?'':grid.innerHTML;
            if(data.items){
                data.items.forEach(function(item){
                    var s=item.snippet;
                    var title=s.title;
                    var channel=s.channelTitle;
                    var thumb=s.thumbnails.medium.url;
                    var id=isSearch?item.id.videoId:item.id;
                    var views=item.statistics?Number(item.statistics.viewCount).toLocaleString():'';
                    html+='<div class="video-card" onclick="playVideo(\''+id+'\',\''+esc(title)+'\')"><img src="'+thumb+'" loading="lazy"><div class="info"><div class="title">'+title+'</div><div class="channel">'+channel+'</div>'+(views?'<div class="views">👁 '+views+'</div>':'')+'</div></div>';
                });
            }
            grid.innerHTML=html||'<div class="loading">😔 Ничего не найдено</div>';
            document.getElementById('loadMore').style.display=nextPageToken?'block':'none';
        }

        function loadMore(){
            document.getElementById('loadMore').style.display='none';
            if(currentQuery){fetchSearch(nextPageToken);}else{fetchTrending(nextPageToken);}
        }

        function playVideo(id,title){
            document.getElementById('playerFull').classList.add('active');
            document.getElementById('vidTitle').textContent=title;
            document.getElementById('playerWrap').innerHTML='<iframe src="https://www.youtube.com/embed/'+id+'?autoplay=1" allow="autoplay;encrypted-media" allowfullscreen></iframe>';
        }

        function closePlayer(){
            document.getElementById('playerFull').classList.remove('active');
            document.getElementById('playerWrap').innerHTML='';
        }

        function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

        document.addEventListener('keydown',function(e){if(e.key==='Escape')closePlayer();});
        fetchTrending("");
    </script>
</body>
</html>
