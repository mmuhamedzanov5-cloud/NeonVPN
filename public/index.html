<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔒 NeonVPN</title>
    <style>
        :root { --bg:#0a0f0a;--bg2:#111a11;--text:#c8e6c8;--text2:#8fbc8f;--accent:#ff0040;--border:#2a3a2a;--input:#152015;--radius:14px; }
        * { margin:0;padding:0;box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);height:100vh;width:100vw;display:flex;flex-direction:column;overflow:hidden;position:fixed; }
        .header { background:var(--bg2);padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0; }
        .header h1 { font-size:20px;color:var(--accent);text-align:center;margin-bottom:8px; }
        .url-row { display:flex;gap:6px; }
        .url-row input { flex:1;padding:10px 14px;border-radius:24px;border:1px solid var(--border);background:var(--input);color:var(--text);font-size:13px;outline:none; }
        .url-row input:focus { border-color:var(--accent); }
        .url-row button { padding:10px 16px;border-radius:24px;border:none;background:var(--accent);color:#fff;font-weight:700;cursor:pointer;font-size:13px;white-space:nowrap; }
        iframe { flex:1;width:100%;border:none;background:#fff; }
        .toast { position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;z-index:999;animation:fadeIn 0.3s;pointer-events:none; }
        @keyframes fadeIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔒 NeonVPN</h1>
        <div class="url-row">
            <input type="text" id="urlInput" placeholder="Введи адрес сайта..." value="https://ya.ru" onkeypress="if(event.key==='Enter')openSite()">
            <button onclick="openSite()">🚀</button>
        </div>
    </div>
    <iframe id="frame"></iframe>
    <script>
        function openSite(){
            var url=document.getElementById('urlInput').value.trim();
            if(!url)return;
            if(!url.startsWith('http'))url='https://'+url;
            document.getElementById('frame').src='/proxy?url='+encodeURIComponent(url);
        }
        openSite();
    </script>
</body>
</html>
