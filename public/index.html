<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 NeonVPN</title>
    <style>
        :root { --bg:#0a0a0a;--accent:#ff0040;--text:#fff;--input:#1a1a1a; }
        * { margin:0;padding:0;box-sizing:border-box; }
        body { font-family:Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px; }
        .card { background:#111;border-radius:20px;padding:30px;width:100%;max-width:500px;text-align:center;border:1px solid #222;box-shadow:0 0 40px rgba(255,0,64,0.2); }
        h1 { font-size:28px;margin-bottom:4px;color:var(--accent); }
        p { color:#aaa;font-size:13px;margin-bottom:20px; }
        input { width:100%;padding:14px;border-radius:12px;border:1px solid #333;background:var(--input);color:var(--text);font-size:14px;outline:none;margin-bottom:10px; }
        input:focus { border-color:var(--accent); }
        button { width:100%;padding:14px;border-radius:12px;border:none;background:var(--accent);color:white;font-weight:700;font-size:14px;cursor:pointer; }
        iframe { width:100%;height:400px;border:none;margin-top:16px;border-radius:12px;display:none;background:white; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔒 NeonVPN</h1>
        <p>Открывай любые сайты без ограничений</p>
        <input type="text" id="urlInput" placeholder="https://example.com" value="https://ya.ru">
        <button onclick="openSite()">🚀 Открыть</button>
        <iframe id="frame"></iframe>
    </div>
    <script>
        function openSite(){
            var url=document.getElementById('urlInput').value.trim();
            if(!url)return;
            if(!url.startsWith('http'))url='https://'+url;
            document.getElementById('frame').style.display='block';
            document.getElementById('frame').src='/proxy?url='+encodeURIComponent(url);
        }
    </script>
</body>
</html>
